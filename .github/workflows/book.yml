    - cron: "50 18 * * 2"  # cycle-tue — opens Tue 11:15 PT (PST, primary, fire -25m)
    - cron: "0 18 * * 2"  # cycle-tue — opens Tue 11:15 PT (PDT, retry 1, fire -15m)
    - cron: "0 19 * * 2"  # cycle-tue — opens Tue 11:15 PT (PST, retry 1, fire -15m)
