    - cron: "0 19 * * 4"  # cycle-sculpt-thu — opens Thu 11:15 PT (PST, retry 1, fire -15m)
    - cron: "20 17 * * 5"  # core-fri — opens Fri 10:45 PT (PDT, primary, fire -25m)
    - cron: "20 18 * * 5"  # core-fri — opens Fri 10:45 PT (PST, primary, fire -25m)
    - cron: "30 17 * * 5"  # core-fri — opens Fri 10:45 PT (PDT, retry 1, fire -15m)
    - cron: "30 18 * * 5"  # core-fri — opens Fri 10:45 PT (PST, retry 1, fire -15m)
    - cron: "55 18 * * 5"  # lift-hiit-fri — opens Fri 12:20 PT (PDT, primary, fire -25m)
    - cron: "55 19 * * 5"  # lift-hiit-fri — opens Fri 12:20 PT (PST, primary, fire -25m)
