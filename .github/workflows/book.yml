    - cron: "5 19 * * 3"  # core-wed — opens Wed 11:30 PT (PST, primary, fire -25m)
    - cron: "15 18 * * 3"  # core-wed — opens Wed 11:30 PT (PDT, retry 1, fire -15m)
    - cron: "15 19 * * 3"  # core-wed — opens Wed 11:30 PT (PST, retry 1, fire -15m)
    - cron: "50 17 * * 4"  # cycle-sculpt-thu — opens Thu 11:15 PT (PDT, primary, fire -25m)
    - cron: "50 18 * * 4"  # cycle-sculpt-thu — opens Thu 11:15 PT (PST, primary, fire -25m)
