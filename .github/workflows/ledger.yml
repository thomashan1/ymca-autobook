name: Bookings ledger

on:
  schedule:
    - cron: "0 */12 * * *"  # every 12 hours (UTC) — keep the ledger fresh
  workflow_dispatch: {}

concurrency:
  group: ledger-${{ github.run_id }}

jobs:
  ledger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - name: Update bookings ledger
        env:
          EGYM_USERNAME: ${{ secrets.EGYM_USERNAME }}
          EGYM_PASSWORD: ${{ secrets.EGYM_PASSWORD }}
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: python scripts/update_ledger.py
