name: Weekly class summary

on:
  schedule:
    # Each slot has a PDT and a PST cron; both fire, but the script inspects
    # which cron triggered (github.event.schedule) and lets only the one matching
    # the current DST offset actually send — robust to GitHub's scheduling lag.
    - cron: "7 7 * * 1"   # Mon 00:07 PT (PDT = UTC-7) — this week; early + off-peak to dodge GitHub's queue delay
    - cron: "7 8 * * 1"   # Mon 00:07 PT (PST = UTC-8)
    - cron: "0 22 * * 3"  # Wed 15:00 PT (PDT = UTC-7) — midweek update (this + next week)
    - cron: "0 23 * * 3"  # Wed 15:00 PT (PST = UTC-8)
    - cron: "0 22 * * 5"  # Fri 15:00 PT (PDT = UTC-7) — preview next week's bookings
    - cron: "0 23 * * 5"  # Fri 15:00 PT (PST = UTC-8)
  workflow_dispatch:
    inputs:
      weeks:
        description: "Which week(s) to include (manual runs)"
        type: choice
        default: auto
        options: [auto, this, next, both]

concurrency:
  group: weekly-summary-${{ github.run_id }}

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - name: Summarise booked classes
        env:
          EGYM_USERNAME: ${{ secrets.EGYM_USERNAME }}
          EGYM_PASSWORD: ${{ secrets.EGYM_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          SUMMARY_WEEKS: ${{ inputs.weeks }}
          SCHEDULE_CRON: ${{ github.event.schedule }}
        run: python scripts/weekly_summary.py
