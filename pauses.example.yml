# TEMPLATE — the REAL file lives in a separate PRIVATE repo (default:
# thomashan1/ymca-private) so your away-dates are never published here.
#
# Each entry is an inclusive date range in the schedule's local timezone listing
# the dates of CLASSES you won't attend. The bot skips booking any class whose
# own date falls in a range (matched on the class date, not the run date —
# booking opens ~7 days ahead). You resume on the day AFTER `end`. `end` may be
# omitted for a single day.
#
# Edit the copy in the private repo (GitHub web/mobile: open file -> edit ->
# commit). This template is only here to document the format.

# `except` (optional): class key(s) from classes.yml to KEEP booking even though
# the day is paused — e.g. you're "off" but still want one specific class.
pauses:
  - {start: 2026-07-03, end: 2026-07-03}   # single day off (Fri)
  - {start: 2026-07-06, end: 2026-07-06, except: [lift-hiit-mon]}  # off, but keep Lift & H.I.I.T.
  - {start: 2026-07-07, end: 2026-07-12}   # away; resume Mon 7/13
